name: Label & comment issues
on:
  issues:
    types: [reopened, opened, closed] # Lisätty 'closed', jotta sulkeminen huomataan
  pull_request:
    types: [opened] # Lisätty 'pull_request', jotta ensimmäinen PR huomataan

jobs:
  label_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write # Lisätty oikeus Pull Requesteihin kommentointiin
    steps:
      # 1. Alkuperäinen vaihe (attach label)
      - name: attach label to issues
        if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["issue", "fix"]
            })

      # 2. Alkuperäinen vaihe (Comment on new issue)
      - name: Comment on new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: peter-evans/create-or-update-comment@v4 # Päivitetty versio v4:ksi
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening this issue! We'll take a look as soon as possible.

      # 3. UUSI: Kommentti kun issue suljetaan (Comment on when an issue is closed)
      - name: Comment on closed issue
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            The issue is now resolved.

      # 4. UUSI: Onnittelu ensimmäisestä PR:stä (Comment on when an users opens the first pull request)
      - name: Comment on first PR
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v6
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: creator
            });

            if (pullRequests.length === 1) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Congratulations @${creator} for opening your first pull request! 🎉`
              });
            }
